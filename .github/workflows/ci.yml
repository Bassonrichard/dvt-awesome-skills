name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate canonical assets
        run: npm run validate

      - name: Build README + llms.txt
        run: npm run build

      - name: Check generated files are committed
        run: |
          if [ -n "$(git status --porcelain README.md llms.txt)" ]; then
            echo "::error::README.md / llms.txt are stale. Run 'npm run build' and commit the result."
            git --no-pager diff README.md llms.txt
            exit 1
          fi

      - name: Build website (data + Astro)
        run: |
          npm --prefix website ci
          npm run website:build

      - name: Smoke-test installers (all tools)
        run: |
          for tool in copilot cursor windsurf claude kiro; do
            node ./eng/install.mjs --tool "$tool" --dir "$(mktemp -d)" >/dev/null
          done
          echo "All adapters produced output."
